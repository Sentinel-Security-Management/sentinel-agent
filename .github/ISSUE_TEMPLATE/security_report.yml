name: Security Concern
description: Report a potential security issue.
title: "[SECURITY] "
labels:
  - security

body:
  - type: markdown
    attributes:
      value: |
        ⚠️ Do NOT include sensitive exploit details in public issues.

        For critical vulnerabilities, use the private security reporting process described in SECURITY.md.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the issue.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Potential Impact
      description: What could an attacker do?
    validations:
      required: true

  - type: textarea
    id: affected
    attributes:
      label: Affected Components
      description: Which modules are affected?

  - type: textarea
    id: mitigation
    attributes:
      label: Suggested Mitigation
      description: Optional recommendations.

  - type: checkboxes
    id: acknowledgement
    attributes:
      label: Confirmation
      options:
        - label: I understand that critical vulnerabilities should be reported privately.
          required: true