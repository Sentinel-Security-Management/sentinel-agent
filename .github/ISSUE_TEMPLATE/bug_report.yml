name: Bug Report
description: Report a bug or unexpected behavior.
title: "[BUG] "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the problem.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run command...
        2. Configure...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Sentinel Version
      placeholder: v0.1.0

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - Windows
        - macOS
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant logs or error messages.

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues before creating this report.
          required: true